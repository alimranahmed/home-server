services:
    excalidraw:
        image: alswl/excalidraw:latest
        ports:
            - "${EXCALIDRAW_PORT}:80"
        environment:
            - VITE_APP_BACKEND_V2_GET_URL=https://${HOST}:${STORAGE_PORT}/api/v2/
            - VITE_APP_BACKEND_V2_POST_URL=https://${HOST}:${STORAGE_PORT}/api/v2/post/
            - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://${HOST}:${STORAGE_PORT}/api/v2
            - VITE_APP_STORAGE_BACKEND=http
            - VITE_APP_WS_SERVER_URL=ws://${HOST}:${WS_PORT}
        depends_on:
            - storage
            - room

    storage:
        image: alswl/excalidraw-storage-backend:v2023.11.11
        restart: unless-stopped
        ports:
            - "${STORAGE_PORT}:8081"
        environment:
            - PORT=8081

    room:
        image: excalidraw/excalidraw-room:latest
        restart: unless-stopped
        ports:
            - "${WS_PORT}:80"