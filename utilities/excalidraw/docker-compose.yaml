services:
    nginx:
        image: nginx:alpine
        ports:
            - "${EXCALIDRAW_PORT}:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - excalidraw
            - storage
            - room
    excalidraw:
        image: alswl/excalidraw:latest
        expose:
            - "80"
        environment:
            - VITE_APP_BACKEND_V2_GET_URL=https://${HOST}/api/v2/
            - VITE_APP_BACKEND_V2_POST_URL=https://${HOST}/api/v2/post/
            - VITE_APP_HTTP_STORAGE_BACKEND_URL=https://${HOST}/api/v2
            - VITE_APP_WS_SERVER_URL=wss://${HOST}
        depends_on:
            - storage
            - room

    storage:
        image: alswl/excalidraw-storage-backend:v2023.11.11
        restart: unless-stopped
        expose:
            - "8081"
        environment:
            - PORT=8081

    room:
        image: excalidraw/excalidraw-room:latest
        restart: unless-stopped
        expose:
            - "80"